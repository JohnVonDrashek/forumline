services:
  victoria-logs:
    image: victoriametrics/victoria-logs:latest
    restart: unless-stopped
    volumes:
      - victoria-logs-data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=30d
      - -httpListenAddr=:9428
    ports:
      - "9428:9428"

  dozzle:
    image: amir20/dozzle:v10.1.1
    restart: unless-stopped
    volumes:
      - /opt/logs/users.yml:/data/users.yml:ro
    environment:
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_REMOTE_AGENT: "192.168.1.23:7007,192.168.1.99:7007,192.168.1.106:7007,192.168.1.107:7007"
    ports:
      - "8080:8080"

volumes:
  victoria-logs-data:
