services:
  forum:
    build:
      context: .
      dockerfile: Dockerfile.go-forum
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - PORT=3000

  forumline:
    build:
      context: .
      dockerfile: Dockerfile.go-forumline
      args:
        GITHUB_PACKAGES_TOKEN: ${GITHUB_PACKAGES_TOKEN}
    ports:
      - "3001:3000"
    env_file:
      - forumline-identity-and-federation-web/.env.local
    environment:
      - PORT=3000
