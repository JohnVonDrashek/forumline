name: Deploy to Fly.io

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      FLY_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: >-
          flyctl deploy
          --config ${{ inputs.working-directory }}/fly.toml
          --dockerfile Dockerfile.${{ inputs.working-directory }}
          --build-arg GITHUB_PACKAGES_TOKEN=${{ secrets.GITHUB_TOKEN }}
          --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
