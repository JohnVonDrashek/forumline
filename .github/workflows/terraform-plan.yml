name: Terraform Plan

on:
  pull_request:
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.TF_STATE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_STATE_R2_SECRET_ACCESS_KEY }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
      TF_VAR_state_encryption_passphrase: ${{ secrets.TF_STATE_ENCRYPTION_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.11.5'

      - name: Init
        working-directory: deploy/terraform
        run: tofu init

      - name: Plan
        id: plan
        working-directory: deploy/terraform
        run: |
          tofu plan -var-file=prod.tfvars -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('deploy/terraform/plan.txt', 'utf8');

            // Trim to 60k chars to stay under GitHub comment limit
            if (plan.length > 60000) {
              plan = plan.substring(0, 60000) + '\n\n... (truncated)';
            }

            const body = `### OpenTofu Plan\n\n\`\`\`\n${plan}\n\`\`\`\n\n*Pushed by @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### OpenTofu Plan'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
