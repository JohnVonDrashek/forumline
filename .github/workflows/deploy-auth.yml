name: Deploy Zitadel Auth

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/auth/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Dagger
        uses: dagger/dagger-for-github@v7
        with:
          version: "0.20.1"
          verb: call
          args: >-
            deploy
            --source .
            --service auth
            --ssh-key env:SSH_KEY
            --cf-access-client-id env:CF_CLIENT_ID
            --cf-access-client-secret env:CF_CLIENT_SECRET
            --sops-age-key env:SOPS_AGE_KEY
          module: ./ci
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          CF_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
