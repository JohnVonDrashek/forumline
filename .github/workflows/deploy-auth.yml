name: Deploy Zitadel Auth

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/auth/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Decrypt and upload env
        run: |
          SOPS_AGE_KEY="${{ secrets.SOPS_AGE_KEY }}" sops -d --input-type dotenv --output-type dotenv deploy/compose/auth/.env.enc > /tmp/auth.env
          scp -o StrictHostKeyChecking=no /tmp/auth.env root@192.168.1.110:/opt/auth/.env
          rm -f /tmp/auth.env

      - name: Upload compose file
        run: scp -o StrictHostKeyChecking=no deploy/compose/auth/docker-compose.yml root@192.168.1.110:/opt/auth/docker-compose.yml

      - name: Rebuild and restart
        run: ssh -o StrictHostKeyChecking=no root@192.168.1.110 "cd /opt/auth && docker compose pull && docker compose up -d --wait && docker compose ps"
