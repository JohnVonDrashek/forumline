name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/website/**'
      - 'deploy/docker/Dockerfile.website'
      - '.github/workflows/deploy-website.yml'
      - 'deploy/compose/website/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FORUM_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<EOF
          Host website-prod
            HostName www-ssh.forumline.net
            User root
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h --id $CF_ACCESS_CLIENT_ID --secret $CF_ACCESS_CLIENT_SECRET
          EOF

      - name: Deploy
        run: |
          scp deploy/compose/website/docker-compose.yml website-prod:/opt/website/docker-compose.yml
          ssh website-prod "cd /opt/website/repo && git fetch origin main && git reset --hard origin/main && cd /opt/website && docker compose up -d --build website && docker compose ps"
