name: Deploy Forumline Central Services

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go-services/**'
      - 'central-services/src/**'
      - 'central-services/index.html'
      - 'central-services/vite.config.ts'
      - 'central-services/tsconfig.json'
      - 'central-services/package.json'
      - 'packages/**'
      - 'package-lock.json'
      - 'Dockerfile.go-hub'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FORUM_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<EOF
          Host forum-prod
            HostName ssh.forumline.net
            User root
            IdentityFile ~/.ssh/id_deploy
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy
        run: |
          ssh forum-prod "ssh -o StrictHostKeyChecking=no root@192.168.1.99 'cd /opt/hub/repo && git pull origin main && cd /opt/hub && docker compose up -d --build hub && docker compose ps'"
