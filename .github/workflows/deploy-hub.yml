name: Deploy Forumline Central Services

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'go-services/**'
      - 'central-services/src/**'
      - 'central-services/index.html'
      - 'central-services/vite.config.ts'
      - 'central-services/tsconfig.json'
      - 'central-services/package.json'
      - 'packages/**'
      - 'package-lock.json'
      - 'Dockerfile.go-hub'

jobs:
  deploy:
    uses: ./.github/workflows/deploy-fly.yml
    with:
      working-directory: go-hub
    secrets: inherit
