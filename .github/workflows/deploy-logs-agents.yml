name: Deploy Logs Agents

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/logs-agent/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to all hosts
        run: |
          for host in forum-prod forumline-prod website-prod hosted-prod; do
            echo "=== Deploying to $host ==="
            ssh "$host" "mkdir -p /opt/logs-agent"
            sed "s/\${LOGS_HOST_LABEL}/$host/" deploy/compose/logs-agent/alloy-config.alloy > "/tmp/alloy-config-$host.alloy"
            scp deploy/compose/logs-agent/docker-compose.yml "$host:/opt/logs-agent/docker-compose.yml"
            scp deploy/compose/logs-agent/docker-compose.dozzle.yml "$host:/opt/logs-agent/docker-compose.dozzle.yml"
            scp "/tmp/alloy-config-$host.alloy" "$host:/opt/logs-agent/alloy-config.alloy"
            ssh "$host" "cd /opt/logs-agent && docker compose pull && docker compose up -d --force-recreate && docker compose -f docker-compose.dozzle.yml pull && docker compose -f docker-compose.dozzle.yml up -d"
            rm -f "/tmp/alloy-config-$host.alloy"
          done
