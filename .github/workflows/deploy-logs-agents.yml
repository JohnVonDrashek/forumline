name: Deploy Vector Agents

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/logs-agent/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Vector agents to all LXCs
        run: ci/deploy-logs-agents.sh
