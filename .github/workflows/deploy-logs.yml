name: Deploy Logs (Central)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'deploy/compose/logs/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Upload config files
        run: |
          scp deploy/compose/logs/docker-compose.yml logs-prod:/opt/logs/docker-compose.yml
          scp deploy/compose/logs/users.yml logs-prod:/opt/logs/users.yml

      - name: Pull and restart
        run: ssh logs-prod "cd /opt/logs && docker compose pull && docker compose up -d && docker compose ps"
