name = "forumline-status"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# Routes — intercept tunnel-backed domains (except status page itself)
# forumline.net is on Cloudflare Pages now — no worker needed
routes = [
  { pattern = "app.forumline.net/*", zone_name = "forumline.net" },
  { pattern = "hosted.forumline.net/*", zone_name = "forumline.net" },
]
